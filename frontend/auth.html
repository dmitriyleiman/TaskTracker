<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

  <div class="auth-card">

    <div class="auth-title" id="title">Login</div>

    <input id="email" class="auth-input" placeholder="email" />
    <input id="password" class="auth-input" type="password" placeholder="password" />

    <button class="auth-button" onclick="submitAuth()">Login</button>

    <div class="auth-switch" onclick="toggleMode()">
      No account? Register
    </div>

    <pre id="output"></pre>

  </div>

<script src="js/auth.js"></script>

</body>
</html>
